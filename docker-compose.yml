services:
  postgres:
    image: postgres:16-alpine
    container_name: infrapredict-postgres
    environment:
      POSTGRES_USER: infrapredict
      POSTGRES_PASSWORD: infrapredict
      POSTGRES_DB: infrapredict
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrapredict -d infrapredict"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment once the FastAPI app is implemented
  # api:
  #   build: .
  #   container_name: infrapredict-api
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./app:/app/app
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
